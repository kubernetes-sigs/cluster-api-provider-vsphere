---
kind: CustomResourceStateMetrics
spec:
  resources:
  - errorLogV: 0
    groupVersionKind:
      group: vmware.infrastructure.cluster.x-k8s.io
      kind: VSphereCluster
      version: v1beta2
    labelsFromPath:
      cluster_name:
      - metadata
      - labels
      - cluster.x-k8s.io/cluster-name
      name:
      - metadata
      - name
      namespace:
      - metadata
      - namespace
      uid:
      - metadata
      - uid
    metricNamePrefix: capi_vspherecluster
    metrics:
    - each:
        info:
          labelsFromPath:
            paused_value: []
          path:
          - metadata
          - annotations
          - cluster.x-k8s.io/paused
        type: Info
      help: Whether the vspherecluster is paused and any of its resources will not
        be processed by the controllers.
      name: annotation_paused
    - each:
        gauge:
          nilIsZero: false
          path:
          - metadata
          - creationTimestamp
          valueFrom: null
        type: Gauge
      help: Unix creation timestamp.
      name: created
    - each:
        info:
          labelsFromPath:
            name:
            - metadata
            - name
          path: null
        type: Info
      help: Information about a vspherecluster.
      name: info
    - each:
        info:
          labelsFromPath:
            owner_is_controller:
            - controller
            owner_kind:
            - kind
            owner_name:
            - name
            owner_uid:
            - uid
          path:
          - metadata
          - ownerReferences
        type: Info
      help: Owner references.
      name: owner
    - each:
        stateSet:
          labelName: status
          labelsFromPath:
            type:
            - type
          list:
          - "True"
          - "False"
          - Unknown
          path:
          - status
          - conditions
          valueFrom:
          - status
        type: StateSet
      help: The condition of a vspherecluster.
      name: status_condition
    - each:
        gauge:
          labelsFromPath:
            status:
            - status
            type:
            - type
          nilIsZero: false
          path:
          - status
          - conditions
          valueFrom:
          - lastTransitionTime
        type: Gauge
      help: The condition last transition time of a vspherecluster.
      name: status_condition_last_transition_time
    resourcePlural: ""
  - errorLogV: 0
    groupVersionKind:
      group: vmware.infrastructure.cluster.x-k8s.io
      kind: VSphereMachine
      version: v1beta2
    labelsFromPath:
      cluster_name:
      - metadata
      - labels
      - cluster.x-k8s.io/cluster-name
      name:
      - metadata
      - name
      namespace:
      - metadata
      - namespace
      uid:
      - metadata
      - uid
    metricNamePrefix: capi_vspheremachine
    metrics:
    - each:
        info:
          labelsFromPath:
            paused_value: []
          path:
          - metadata
          - annotations
          - cluster.x-k8s.io/paused
        type: Info
      help: Whether the vspheremachine is paused and any of its resources will not
        be processed by the controllers.
      name: annotation_paused
    - each:
        gauge:
          nilIsZero: false
          path:
          - metadata
          - creationTimestamp
          valueFrom: null
        type: Gauge
      help: Unix creation timestamp.
      name: created
    - each:
        info:
          labelsFromPath:
            provider_id:
            - spec
            - providerID
          path: null
        type: Info
      help: Information about a vspheremachine.
      name: info
    - each:
        info:
          labelsFromPath:
            owner_is_controller:
            - controller
            owner_kind:
            - kind
            owner_name:
            - name
            owner_uid:
            - uid
          path:
          - metadata
          - ownerReferences
        type: Info
      help: Owner references.
      name: owner
    - each:
        info:
          labelsFromPath:
            address:
            - address
            type:
            - type
          path:
          - status
          - addresses
        type: Info
      help: Address information about a vspheremachine.
      name: status_addresses
    - each:
        stateSet:
          labelName: status
          labelsFromPath:
            type:
            - type
          list:
          - "True"
          - "False"
          - Unknown
          path:
          - status
          - conditions
          valueFrom:
          - status
        type: StateSet
      help: The condition of a vspheremachine.
      name: status_condition
    - each:
        gauge:
          labelsFromPath:
            status:
            - status
            type:
            - type
          nilIsZero: false
          path:
          - status
          - conditions
          valueFrom:
          - lastTransitionTime
        type: Gauge
      help: The condition last transition time of a vspheremachine.
      name: status_condition_last_transition_time
    - each:
        stateSet:
          labelName: phase
          list:
            - NotFound
            - Created
            - PoweredOn
            - Pending
            - Ready
            - Deleting
            - Error
          path:
            - status
            - phase
          valueFrom: null
        type: StateSet
      help: The vspheremachines current phase.
      name: status_phase
    resourcePlural: ""
