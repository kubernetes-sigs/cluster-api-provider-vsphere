apiVersion: apps/v1
kind: Deployment
metadata:
  name: controller-manager
  namespace: system
spec:
  template:
    spec:
      containers:
      - args:
        - --leader-elect
        - "--diagnostics-address=${CAPI_DIAGNOSTICS_ADDRESS:=:8443}"
        - "--insecure-diagnostics=${CAPI_INSECURE_DIAGNOSTICS:=false}"
        - --v=4
        - "--feature-gates=PriorityQueue=${EXP_PRIORITY_QUEUE:=true},ReconcilerRateLimiting=${EXP_RECONCILER_RATE_LIMITING:=true},MultiNetworks=${EXP_MULTI_NETWORKS:=false},NamespaceScopedZones=${EXP_NAMESPACE_SCOPED_ZONES:=false},NodeAutoPlacement=${EXP_NODE_AUTO_PLACEMENT:=false},IPv6DualStack=${EXP_IPV6_DUAL_STACK:=false}"
        - "--vm-operator-api-version=${VM_OPERATOR_API_VERSION:=v1alpha5}"
        name: manager