- op: add
  path: /spec/controlPlane/naming
  value:
    template: '{{ .cluster.name }}'
- op: add
  path: /spec/infrastructure/naming
  value:
    template: '{{ .cluster.name }}'
- op: add
  path: /spec/workers/machineDeployments/0/naming
  value:
    template: '{{ .cluster.name }}-{{ .machineDeployment.topologyName }}'
