---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.16.1
  name: foundationloadbalancerconfigs.netoperator.vmware.com
spec:
  group: netoperator.vmware.com
  names:
    kind: FoundationLoadBalancerConfig
    listKind: FoundationLoadBalancerConfigList
    plural: foundationloadbalancerconfigs
    shortNames:
    - flb
    singular: foundationloadbalancerconfig
  scope: Namespaced
  versions:
  - name: v1alpha1
    schema:
      openAPIV3Schema:
        description: FoundationLoadBalancerConfig is the Schema for the FoundationLoadBalancerConfig
          API
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              FoundationLoadBalancerConfigSpec defines the configuration for a vSphere Foundation Load Balancer.
              This specification is used to configure the resources for the load balancer on vCenter Server.
            properties:
              deploymentSpec:
                description: DeploymentSpec describes sizing and placement constraints
                  of the load balancer.
                properties:
                  activePassiveSpec:
                    description: |-
                      ActivePassiveAvailabilityMode configures the load balancer in active-passive configuration.
                      Active-passive configuration consists of a two node deployment with one node configured to
                      actively service traffic with the second node in standby mode. When the service detects the
                      active node is unhealthy, traffic will be moved to the passive node after a short delay.
                      Connections may be dropped on fail-over.
                    properties:
                      replicas:
                        default: 2
                        description: Replicas describes the total number of deployed
                          nodes. Defaults to 2.
                        format: int32
                        maximum: 2
                        type: integer
                    required:
                    - replicas
                    type: object
                  availabilityMode:
                    default: active-passive
                    description: AvailabilityMode defines how the availability of
                      the solution is deployed and configured.
                    enum:
                    - active-passive
                    - single-node
                    type: string
                  singleNodeSpec:
                    description: |-
                      SingleNodeAvailabilityMode deploys a single node to serve load balancer traffic. If the node
                      fails, the service will attempt to redeploy it, but redeployment is best-effort and depends on
                      the health of the underlying infrastructure. You must select
                    properties:
                      replicas:
                        default: 1
                        description: Replicas describes the total number of deployed
                          nodes. Defaults to 1.
                        format: int32
                        maximum: 1
                        type: integer
                    required:
                    - replicas
                    type: object
                  size:
                    default: small
                    description: Size describes the node form factor.
                    enum:
                    - small
                    - medium
                    - large
                    - xlarge
                    type: string
                  storagePolicy:
                    description: StoragePolicy is a vSphere Storage Policy ID which
                      defines node storage placement.
                    type: string
                  version:
                    description: |-
                      Version number desired by the operator.

                      Defaults to the latest available.
                    type: string
                  zones:
                    description: |-
                      Zones contains the names of zones eligible for placing nodes. Zones must be one of the
                      AvailabilityZones defined and eligible for placement on the cluster.
                    items:
                      type: string
                    type: array
                required:
                - availabilityMode
                - size
                - storagePolicy
                - zones
                type: object
              managementNetwork:
                description: |-
                  ManagementNetwork points to the Network used to program node management network interfaces.

                  If unset, the VirtualIPNetwork will be used for management traffic.
                properties:
                  apiVersion:
                    description: APIVersion of the referent.
                    type: string
                  kind:
                    description: Kind is the type of resource being referenced.
                    type: string
                  name:
                    description: Name is the name of resource being referenced.
                    type: string
                required:
                - kind
                - name
                type: object
              networkSpec:
                description: |-
                  NetworkSpec contains values for configuring networks on the load balancer.
                  If unset, default settings will be applied.
                properties:
                  dnsSearchDomains:
                    default: []
                    description: DNSSearchDomains are the domains resolvable on the
                      specified DNSServers.
                    items:
                      type: string
                    type: array
                  dnsServers:
                    default: []
                    description: |-
                      DNSServers is the list of servers used for DNS traffic.
                      These servers must be reachable from the network configured
                      for management traffic.
                    items:
                      type: string
                    type: array
                  ntpServers:
                    default: []
                    description: |-
                      NTPServers are the servers used to sync time across nodes.
                      These servers must be reachable from the network configured
                      for management traffic.
                    items:
                      type: string
                    type: array
                  syslogCertificate:
                    description: |-
                      SyslogCertificateSecretName is the certificate required to verify
                      the TLS syslog endpoint in PEM format.
                    type: string
                  syslogEndpoint:
                    description: |-
                      SyslogEndpoint configures the syslog server. It accepts a protocol, host and port.
                      If using TLS, you must configure a TLS CA that is capable of verifying the endpoint certificate.
                      E.g. [protocol://]host[:port]
                      This server must be reachable from the network configured for management traffic.

                      If empty, data will be logged locally to load balancer nodes.
                      Defaults to port 514 if using UDP and 6514 if using TLS.
                    type: string
                  virtualServerIPPools:
                    description: |-
                      VirtualServerIPPools are the list of IPPools that are
                      used for load balancer IP addresses.
                    items:
                      properties:
                        apiVersion:
                          description: API version of the referent.
                          type: string
                        name:
                          description: Name of the IPPool resource being referenced.
                          type: string
                      required:
                      - name
                      type: object
                    type: array
                  virtualServerSubnets:
                    default: []
                    description: |-
                      VirtualServerSubnets are the list of subnets specified in CIDR notation
                      that are directly connected to the VirtualIPNetwork.

                      The VirtualServerIPPools must fall within the subnet of the VirtualIPNetwork
                      or one of these subnets.
                    items:
                      type: string
                    type: array
                required:
                - virtualServerIPPools
                type: object
              virtualIPNetwork:
                description: VirtualIPNetwork points to the Network used to program
                  node VIP network interfaces.
                properties:
                  apiVersion:
                    description: APIVersion of the referent.
                    type: string
                  kind:
                    description: Kind is the type of resource being referenced.
                    type: string
                  name:
                    description: Name is the name of resource being referenced.
                    type: string
                required:
                - kind
                - name
                type: object
              workloadNetworks:
                description: |-
                  WorkloadNetwork points to the Network used to program node workload network interfaces.

                  If unset, workload data traffic will be routed out of the same NIF bound to VirtualIPNetwork.
                items:
                  description: NetworkReference is an object that points to a Network.
                  properties:
                    apiVersion:
                      description: APIVersion of the referent.
                      type: string
                    kind:
                      description: Kind is the type of resource being referenced.
                      type: string
                    name:
                      description: Name is the name of resource being referenced.
                      type: string
                  required:
                  - kind
                  - name
                  type: object
                maxItems: 1
                type: array
            required:
            - deploymentSpec
            - virtualIPNetwork
            type: object
          status:
            description: FoundationLoadBalancerConfigStatus describes the observed
              state of the Foundation Load Balancer.
            properties:
              conditions:
                description: Conditions describes states of the load balancer at specific
                  points in time.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              nodes:
                description: Nodes list specific information about each deployed node.
                items:
                  description: FoundationLoadBalancerNodeStatus describes the per-node
                    status of the load balancer.
                  properties:
                    managementNetworkInterface:
                      description: ManagementNetworkInterface defines the management
                        NetworkInterface if it exists.
                      properties:
                        apiVersion:
                          description: APIVersion of the referent.
                          type: string
                        kind:
                          description: Kind is the type of resource being referenced.
                          type: string
                        name:
                          description: Name is the name of resource being referenced.
                          type: string
                      required:
                      - kind
                      - name
                      type: object
                    nodeID:
                      description: NodeID is a node's unique identifier.
                      type: string
                    vipNetworkInterface:
                      description: VIPNetworkInterface is the interface bound to the
                        Virtual IP Network.
                      properties:
                        apiVersion:
                          description: APIVersion of the referent.
                          type: string
                        kind:
                          description: Kind is the type of resource being referenced.
                          type: string
                        name:
                          description: Name is the name of resource being referenced.
                          type: string
                      required:
                      - kind
                      - name
                      type: object
                    workloadNetworkInterfaces:
                      description: WorkloadNetworkInterface defines the workload NetworkInterfaces
                        if they exist.
                      items:
                        description: NetworkInterfaceReference is an object that points
                          to a NetworkInterface.
                        properties:
                          apiVersion:
                            description: APIVersion of the referent.
                            type: string
                          kind:
                            description: Kind is the type of resource being referenced.
                            type: string
                          name:
                            description: Name is the name of resource being referenced.
                            type: string
                        required:
                        - kind
                        - name
                        type: object
                      type: array
                  required:
                  - nodeID
                  - vipNetworkInterface
                  type: object
                type: array
              version:
                description: Version describes the current version of the Foundation
                  Load Balancer.
                type: string
              virtualServerIPPoolsUtilization:
                description: VirtualServerIPPoolsUtilization describes the current
                  states of virtual server IP addresses utilization.
                properties:
                  ipsAllocated:
                    description: IPsAllocated represents the total number of virtual
                      IP addresses currently allocated to services.
                    format: int64
                    type: integer
                  ipsAvailable:
                    description: IPsAvailable represents the total number of virtual
                      IP addresses eligible to be used for services.
                    format: int64
                    type: integer
                type: object
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
