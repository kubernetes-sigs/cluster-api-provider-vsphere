---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.16.1
  name: ippools.netoperator.vmware.com
spec:
  group: netoperator.vmware.com
  names:
    kind: IPPool
    listKind: IPPoolList
    plural: ippools
    singular: ippool
  scope: Cluster
  versions:
  - name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          IPPool is the Schema for the ippools API.
          It represents a pool of IP addresses that are owned and managed by the IPPool controller.
          Provider specific networks can associate themselves with IPPool objects to use
          network operator's IPAM implementation.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: IPPoolSpec defines the desired state of IPPool.
            properties:
              addressCount:
                description: AddressCount represents the number of IP addresses in
                  the pool.
                format: int64
                type: integer
              startingAddress:
                description: StartingAddress represents the starting IP address of
                  the pool.
                type: string
            required:
            - addressCount
            - startingAddress
            type: object
          status:
            description: IPPoolStatus defines the current state of IPPool.
            properties:
              allocated:
                description: Allocated represents the number of IP addresses currently
                  allocated to services.
                format: int64
                type: integer
              conditions:
                description: Conditions is an array of current observed IPPool conditions.
                items:
                  description: IPPoolCondition describes the state of a IPPool at
                    a certain point.
                  properties:
                    message:
                      description: Human-readable message indicating details about
                        last transition.
                      type: string
                    reason:
                      description: Machine understandable string that gives the reason
                        for condition's last transition.
                      type: string
                    status:
                      description: |-
                        Status is the status of the condition.
                        Can be True, False, Unknown.
                      type: string
                    type:
                      description: Type is the type of IPPool condition.
                      type: string
                  required:
                  - status
                  - type
                  type: object
                type: array
            type: object
        type: object
    served: true
    storage: true
