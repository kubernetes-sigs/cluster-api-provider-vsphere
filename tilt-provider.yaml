---
- name: vsphere
  config:
    version: v1.17.99
    image: gcr.io/k8s-staging-capi-vsphere/cluster-api-vsphere-controller
    live_reload_deps:
      - main.go
      - go.mod
      - go.sum
      - apis
      - controllers
      - feature
      - internal
      - pkg
    label: CAPV
- name: vsphere-supervisor
  config:
    version: v1.17.99
    image: gcr.io/k8s-staging-capi-vsphere/cluster-api-vsphere-controller
    live_reload_deps:
      - main.go
      - go.mod
      - go.sum
      - apis
      - controllers
      - feature
      - internal
      - pkg
    label: CAPV
    kustomize_folder: "/config/supervisor-tilt"

# IMPORTANT: run "VM_OPERATOR_VERSION=8.0 VM_OPERATOR_COMMIT_DESCRIBE=v1.8.6-0-gde75746a VM_OPERATOR_COMMIT=de75746a9505ef3161172d99b735d6593c54f0c5 make generate-manifests-vm-operator" before using this "provider" with tilt
- name: vm-operator-8.0
  config:
    version: "8.0"
    label: VMOP
    kustomize_folder: "/test/infrastructure/vm-operator/config/8.0"
    kustomize_options:
      - "--load-restrictor=LoadRestrictionsNone"
    resource_deps:
    # in some cases deploying vm-operator fails because the provider crd is not yet ready. this dependency acts as additional wait.
    - capi_controller

# IMPORTANT: run "VM_OPERATOR_VERSION=9.1 VM_OPERATOR_COMMIT_DESCRIBE=v1.9.0-795-g77005588 VM_OPERATOR_COMMIT=770055883feb2b4f250f6da15fbc53543af5d638 make generate-manifests-vm-operator" before using this "provider" with tilt
- name: vm-operator-9.1
  config:
    version: "9.1"
    label: VMOP
    kustomize_folder: "/test/infrastructure/vm-operator/config/9.1"
    kustomize_options:
      - "--load-restrictor=LoadRestrictionsNone"
    resource_deps:
    # in some cases deploying vm-operator fails because the provider crd is not yet ready. this dependency acts as additional wait.
    - capi_controller
    additional_uncategorized_resources:
    # vm-operator 9.1 requires a config map with the list of supervisor capabilities to exist before the controller starts.
    # NOTE: Because this config map goes in kube-system, it is not possible to add it to vm-operator-9.1.yaml that is
    # used by clusterctl init (init requires all the objects to be in the same namespace).
    - /test/framework/vmoperator/vmoperator-capabilities-9.1.yaml